<head>

<title>Lançamentos · Inventário</title>

<style>
  :root{
    --bg:#F4EEDF; --green:#173A2B; --green2:#235640; --gold:#C9A227;
    --pos:#1F6B3A; --hl:#9C7A1A; --card:#FBF7EC; --line:#E4DBC2;
    --muted:#6b6a5c; --shadow:0 2px 10px rgba(23,58,43,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:'Barlow',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--green);-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
  .serif{font-family:'Playfair Display',Georgia,serif}

  header{position:sticky;top:0;z-index:50;background:var(--green);color:#fff;padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;box-shadow:0 2px 12px rgba(0,0,0,.18)}
  .topbar{display:flex;align-items:center;gap:10px;min-height:34px}
  .back{display:none;border:0;background:rgba(255,255,255,.12);color:#fff;width:34px;height:34px;border-radius:10px;font-size:20px;line-height:1;cursor:pointer;flex:0 0 auto}
  .back.show{display:flex;align-items:center;justify-content:center}
  .titles{flex:1;min-width:0}
  .brand{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600}
  .ctx{font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ctx.serif{font-size:19px}

  .searchwrap{margin-top:10px;position:relative}
  .searchwrap input{width:100%;border:0;border-radius:12px;padding:11px 38px;font-size:15px;font-family:inherit;background:#fff;color:var(--green)}
  .searchwrap .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5;font-size:16px}
  .searchwrap .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:0;background:var(--line);color:var(--green);width:24px;height:24px;border-radius:50%;font-size:15px;line-height:1;cursor:pointer;display:none}
  .searchwrap .clr.show{display:block}

  .filters{display:flex;gap:8px;overflow-x:auto;padding:10px 0 2px;-webkit-overflow-scrolling:touch}
  .filters::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:1px solid rgba(255,255,255,.28);background:transparent;color:#fff;padding:6px 13px;border-radius:20px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}
  .chip.active{background:var(--gold);border-color:var(--gold);color:var(--green);font-weight:600}
  .chip .x{font-size:15px;opacity:.7;line-height:1}
  .chip .dot{background:var(--gold);color:var(--green);border-radius:50%;min-width:17px;height:17px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;padding:0 4px}

  main{padding:14px 14px 30px;max-width:760px;margin:0 auto}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 10px;text-align:center;box-shadow:var(--shadow)}
  .stat .n{font-size:21px;font-weight:700;color:var(--green);line-height:1}
  .stat .n.serif{font-family:'Playfair Display',serif}
  .stat .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-top:5px}
  .sectionlabel{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--hl);font-weight:600;margin:4px 2px 10px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;gap:12px;transition:transform .08s ease}
  .card:active{transform:scale(.985)}
  .card .body{flex:1;min-width:0}
  .card .name{font-size:16.5px;font-weight:600;line-height:1.2}
  .card .name.serif{font-family:'Playfair Display',serif;font-weight:700}
  .card .sub{font-size:13px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .meta{font-size:12.5px;color:var(--green2);margin-top:6px;font-weight:500}
  .card .chev{color:var(--gold);font-size:22px;flex:0 0 auto}
  .pill{display:inline-block;background:#fff;border:1px solid var(--line);border-radius:8px;padding:2px 7px;font-size:11.5px;margin:4px 4px 0 0;color:var(--green2)}

  .ucard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer}
  .ucard:active{transform:scale(.99)}
  .urow1{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .uunit{font-size:16px;font-weight:700}
  .uval{font-size:16px;font-weight:700;color:var(--green);white-space:nowrap;font-family:'Playfair Display',serif}
  .utype{font-size:13px;color:var(--muted);margin-top:2px}
  .ugrid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px 12px;margin-top:9px;font-size:12.5px}
  .ugrid div{display:flex;justify-content:space-between;border-bottom:1px dotted var(--line);padding:2px 0}
  .ugrid .k{color:var(--muted)}
  .ugrid .v{font-weight:600;color:var(--green2)}
  .badge{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
  .b-disp{background:#e0f0e4;color:var(--pos)}
  .b-vend{background:#f3dede;color:#9b2c2c}
  .b-res{background:#f6ecd2;color:var(--hl)}
  .b-neg{background:#e2eaf2;color:#2c5a8b}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px}
  .countline{font-size:13px;color:var(--muted);margin:0 2px 12px;font-weight:500}
  .rkctx{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--hl);font-weight:600;margin-bottom:5px}
  .rkmeta{font-size:12.5px;color:var(--green2);margin-top:7px;font-weight:500}
  .morebtn{width:100%;border:1px dashed var(--gold);background:transparent;color:var(--green);padding:13px;border-radius:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:4px}
  .commbar{margin-top:9px;padding-top:8px;border-top:1px dashed var(--gold);font-size:11.5px;color:var(--hl);font-weight:600}
  .commbox{margin-top:16px;background:#efe7cf;border:1px solid var(--gold);border-radius:12px;padding:12px 14px}
  .commtitle{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--hl);font-weight:700;margin-bottom:8px}
  .commrow{display:flex;justify-content:space-between;padding:5px 0;font-size:14.5px;font-weight:600;color:var(--green)}
  .commrow span:first-child{color:var(--muted);font-weight:500}

  .modal{position:fixed;inset:0;z-index:100;display:none}
  .modal.show{display:block}
  .modal .ovl{position:absolute;inset:0;background:rgba(23,58,43,.5)}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--bg);border-radius:20px 20px 0 0;padding:8px 18px calc(env(safe-area-inset-bottom) + 22px);max-height:90vh;overflow-y:auto;box-shadow:0 -6px 30px rgba(0,0,0,.3);animation:slideup .22s ease}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .grab{width:40px;height:4px;background:var(--line);border-radius:4px;margin:8px auto 14px}
  .dt-emp{font-size:13px;color:var(--hl);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .dt-unit{font-size:26px;font-weight:700;margin:2px 0}
  .dt-val{font-size:30px;font-weight:700;color:var(--green);margin:10px 0 4px}
  .dt-pm{font-size:14px;color:var(--muted)}
  .dt-table{margin-top:18px;border-top:1px solid var(--line)}
  .dt-table .r{display:flex;justify-content:space-between;padding:11px 2px;border-bottom:1px solid var(--line);font-size:14.5px}
  .dt-table .r .k{color:var(--muted)}
  .dt-table .r .v{font-weight:600;text-align:right}
  .closebtn{position:absolute;right:14px;top:14px;border:0;background:var(--line);width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;color:var(--green);z-index:2}

  .fhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .fhead h2{font-family:'Playfair Display',serif;font-size:22px;margin:0}
  .fgroup{margin:22px 0 4px}
  .flabel{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
  .flabel .t{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--hl);font-weight:600}
  .flabel .val{font-size:14px;font-weight:600;color:var(--green)}
  .schips{display:flex;flex-wrap:wrap;gap:8px}
  .schip{border:1px solid var(--line);background:var(--card);color:var(--green2);padding:7px 14px;border-radius:20px;font-size:13.5px;font-weight:500;font-family:inherit;cursor:pointer}
  .schip.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:600}

  .range{position:relative;height:38px;margin:0 6px}
  .range .track{position:absolute;top:17px;left:0;right:0;height:4px;background:var(--line);border-radius:4px}
  .range .fill{position:absolute;top:17px;height:4px;background:var(--gold);border-radius:4px}
  .range input[type=range]{position:absolute;top:0;left:0;width:100%;height:38px;margin:0;background:none;pointer-events:none;-webkit-appearance:none;appearance:none}
  .range input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;pointer-events:auto;width:24px;height:24px;border-radius:50%;background:var(--green);border:3px solid var(--gold);box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer}
  .range input[type=range]::-moz-range-thumb{pointer-events:auto;width:24px;height:24px;border:3px solid var(--gold);background:var(--green);border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer}
  .fbtns{display:flex;gap:10px;margin-top:26px}
  .fbtns button{flex:1;border:0;border-radius:12px;padding:14px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer}
  .fbtns .clear{background:var(--line);color:var(--green)}
  .fbtns .apply{background:var(--green);color:#fff}
</style>
</head>

const fmtBRL = n => n==null ? '—' : new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}).format(n);
const fmtBRLk = n => n==null ? '—' : (n>=1e6 ? 'R$ '+(n/1e6).toLocaleString('pt-BR',{maximumFractionDigits:n>=1e7?0:1})+'mi' : (n>=1e3?'R$ '+Math.round(n/1e3)+'k':fmtBRL(n)));
const fmtNum = (n,d=0)=> n==null ? '—' : n.toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtArea = n => n==null ? '—' : fmtNum(n,n%1?2:0)+' m²';
const norm = s => (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const yearOf = u => { const m=(u.ep||'').match(/20\d{2}/); return m?m[0]:null; };
const $ = id => document.getElementById(id);

const _v=DATA.map(u=>u.v).filter(x=>x!=null), _a=DATA.map(u=>u.ap).filter(x=>x!=null);
const V_MIN=Math.min(..._v), V_MAX=Math.max(..._v), A_MIN=Math.floor(Math.min(..._a)), A_MAX=Math.ceil(Math.max(..._a));
const YEARS=[...new Set(DATA.map(yearOf).filter(Boolean))].sort();
const HAS_NODATE=DATA.some(u=>(u.ep||'').trim() && !yearOf(u));

let state={view:'home',bairro:null,emp:null,sort:'bairro'};
let BROKER=false;
const COMM=[0.009,0.015,0.02];
function commBar(v){return v==null?'':`<div class="commbar">Comissão · 0,9% ${fmtBRLk(v*COMM[0])} · 1,5% ${fmtBRLk(v*COMM[1])} · 2% ${fmtBRLk(v*COMM[2])}</div>`;}
let filter={q:'',status:'disp',vMin:V_MIN,vMax:V_MAX,aMin:A_MIN,aMax:A_MAX,years:[]};
let RANK_LIMIT=200,_lastKey='';
const SORTS={bairro:'Bairros',price_asc:'Menor preço',price_desc:'Maior preço',area_asc:'Menor m²',area_desc:'Maior m²',pm_asc:'Menor R$/m²'};
function cmp(s){const A=Infinity;
  if(s==='price_asc')return(a,b)=>(a.v??A)-(b.v??A);
  if(s==='price_desc')return(a,b)=>(b.v??-A)-(a.v??-A);
  if(s==='area_asc')return(a,b)=>(a.ap??A)-(b.ap??A);
  if(s==='area_desc')return(a,b)=>(b.ap??-A)-(a.ap??-A);
  if(s==='pm_asc')return(a,b)=>(a.pm??A)-(b.pm??A);
  return(a,b)=>0;}

const priceNarrowed=()=> filter.vMin>V_MIN || filter.vMax<V_MAX;
const areaNarrowed =()=> filter.aMin>A_MIN || filter.aMax<A_MAX;

function passFilter(u){
  if(filter.status==='disp' && !/dispon/i.test(u.s)) return false;
  if(filter.status==='out' && /dispon/i.test(u.s)) return false;
  if(priceNarrowed()){ if(u.v==null) return false; if(u.v<filter.vMin||u.v>filter.vMax) return false; }
  if(areaNarrowed()){ if(u.ap==null) return false; if(u.ap<filter.aMin||u.ap>filter.aMax) return false; }
  if(filter.years.length){ const key=yearOf(u)||'none'; if(!filter.years.includes(key)) return false; }
  if(filter.q){ const q=norm(filter.q); if(!norm([u.b,u.e,u.u,u.t,u.en].join(' ')).includes(q)) return false; }
  return true;
}
const units=()=>DATA.filter(passFilter);
function groupBy(arr,key){const m=new Map();for(const x of arr){const k=x[key]||'—';if(!m.has(k))m.set(k,[]);m.get(k).push(x);}return m;}
function range(arr,key){const vals=arr.map(x=>x[key]).filter(v=>v!=null);return vals.length?[Math.min(...vals),Math.max(...vals)]:null;}
function rangeLabel(r){return !r?'—':(r[0]===r[1]?fmtBRLk(r[0]):fmtBRLk(r[0])+' – '+fmtBRLk(r[1]));}
function badge(s){
  if(/dispon/i.test(s))return`<span class="badge b-disp">Disponível</span>`;
  if(/vend/i.test(s))return`<span class="badge b-vend">Vendido</span>`;
  if(/reserv/i.test(s))return`<span class="badge b-res">Reservada</span>`;
  if(/negoci/i.test(s))return`<span class="badge b-neg">Em negociação</span>`;
  return`<span class="badge b-res">${s||'—'}</span>`;
}

function activeCount(){return (filter.status!=='disp'?1:0)+(priceNarrowed()?1:0)+(areaNarrowed()?1:0)+(filter.years.length?1:0);}
function renderFilters(){
  const f=$('filters'); f.innerHTML='';
  const n=activeCount();
  const fb=document.createElement('button');
  fb.className='chip'+(n?' active':'');
  fb.innerHTML=`⚙ Filtros${n?` <span class="dot">${n}</span>`:''}`;
  fb.onclick=openFilters; f.appendChild(fb);
  const sb=document.createElement('button');
  const sortOn=state.sort!=='bairro';
  sb.className='chip'+(sortOn?' active':'');
  sb.innerHTML='⇅ '+(sortOn?SORTS[state.sort]:'Ordenar');
  sb.onclick=openSort; f.appendChild(sb);
  const bb=document.createElement('button');
  bb.className='chip'+(BROKER?' active':'');
  bb.innerHTML='👤 Corretor';
  bb.onclick=()=>{BROKER=!BROKER;render();};
  f.appendChild(bb);
  const rm=(label,fn)=>{const b=document.createElement('button');b.className='chip active';b.innerHTML=`${label} <span class="x">×</span>`;b.onclick=()=>{fn();render();};f.appendChild(b);};
  if(filter.status!=='disp') rm(filter.status==='out'?'Indisponível':'Todos status',()=>filter.status='disp');
  if(priceNarrowed()) rm(`${fmtBRLk(filter.vMin)}–${fmtBRLk(filter.vMax)}`,()=>{filter.vMin=V_MIN;filter.vMax=V_MAX;});
  if(areaNarrowed()) rm(`${filter.aMin}–${filter.aMax} m²`,()=>{filter.aMin=A_MIN;filter.aMax=A_MAX;});
  if(filter.years.length) rm(`Entrega: ${filter.years.map(y=>y==='none'?'s/data':y).join(', ')}`,()=>filter.years=[]);
}

function makeRange(host,opts){
  const STEPS=1000;
  const lmin=Math.log10(opts.min), lmax=Math.log10(opts.max);
  const toPos=v=>opts.scale==='log'?Math.round((Math.log10(v)-lmin)/(lmax-lmin)*STEPS):Math.round((v-opts.min)/(opts.max-opts.min)*STEPS);
  const toVal=p=>{let v=opts.scale==='log'?Math.pow(10,lmin+p/STEPS*(lmax-lmin)):opts.min+p/STEPS*(opts.max-opts.min);return opts.round(v);};
  const wrap=document.createElement('div');wrap.className='range';
  wrap.innerHTML=`<div class="track"></div><div class="fill"></div>
    <input type="range" min="0" max="${STEPS}" step="1" class="lo">
    <input type="range" min="0" max="${STEPS}" step="1" class="hi">`;
  host.appendChild(wrap);
  const lo=wrap.querySelector('.lo'),hi=wrap.querySelector('.hi'),fill=wrap.querySelector('.fill');
  lo.value=toPos(opts.lo); hi.value=toPos(opts.hi);
  const paint=()=>{const a=+lo.value,b=+hi.value;fill.style.left=(Math.min(a,b)/STEPS*100)+'%';fill.style.right=(100-Math.max(a,b)/STEPS*100)+'%';};
  const fire=()=>{let a=+lo.value,b=+hi.value;if(a>b){if(document.activeElement===lo){b=a;hi.value=a;}else{a=b;lo.value=b;}}paint();opts.onInput(toVal(+lo.value),toVal(+hi.value));};
  lo.addEventListener('input',fire);hi.addEventListener('input',fire);
  paint();
}

function openFilters(){
  const s=$('fsheet');
  s.innerHTML=`
    <div class="grab"></div>
    <div class="fhead"><h2>Filtros</h2></div>
    <div class="fgroup"><div class="flabel"><span class="t">Status</span></div><div class="schips" id="fStatus"></div></div>
    <div class="fgroup"><div class="flabel"><span class="t">Faixa de preço</span><span class="val" id="vPrice"></span></div><div id="rPrice"></div></div>
    <div class="fgroup"><div class="flabel"><span class="t">Faixa de área (m²)</span><span class="val" id="vArea"></span></div><div id="rArea"></div></div>
    <div class="fgroup"><div class="flabel"><span class="t">Entrega</span></div><div class="schips" id="fYears"></div></div>
    <div class="fbtns"><button class="clear" id="fClear">Limpar tudo</button><button class="apply" id="fApply">Aplicar</button></div>`;

  const fst=$('fStatus');
  [['disp','Disponível'],['all','Todos'],['out','Indisponível']].forEach(([k,l])=>{
    const b=document.createElement('button');b.className='schip'+(filter.status===k?' on':'');b.textContent=l;
    b.onclick=()=>{filter.status=k;[...fst.children].forEach(c=>c.classList.remove('on'));b.classList.add('on');render();};
    fst.appendChild(b);
  });

  const vp=$('vPrice');const setVP=(a,b)=>vp.textContent=`${fmtBRLk(a)} – ${fmtBRLk(b)}`;
  makeRange($('rPrice'),{min:V_MIN,max:V_MAX,lo:filter.vMin,hi:filter.vMax,scale:'log',
    round:v=>Math.max(V_MIN,Math.min(V_MAX,Math.round(v/10000)*10000)),
    onInput:(a,b)=>{filter.vMin=a;filter.vMax=b;setVP(a,b);render();}});
  setVP(filter.vMin,filter.vMax);

  const va=$('vArea');const setVA=(a,b)=>va.textContent=`${a} – ${b} m²`;
  makeRange($('rArea'),{min:A_MIN,max:A_MAX,lo:filter.aMin,hi:filter.aMax,scale:'lin',
    round:v=>Math.max(A_MIN,Math.min(A_MAX,Math.round(v))),
    onInput:(a,b)=>{filter.aMin=a;filter.aMax=b;setVA(a,b);render();}});
  setVA(filter.aMin,filter.aMax);

  const fy=$('fYears');const yrList=[...YEARS]; if(HAS_NODATE) yrList.push('none');
  yrList.forEach(y=>{
    const b=document.createElement('button');b.className='schip'+(filter.years.includes(y)?' on':'');
    b.textContent=y==='none'?'Sem data':y;
    b.onclick=()=>{const i=filter.years.indexOf(y);if(i<0)filter.years.push(y);else filter.years.splice(i,1);b.classList.toggle('on');render();};
    fy.appendChild(b);
  });

  $('fClear').onclick=()=>{filter.status='disp';filter.vMin=V_MIN;filter.vMax=V_MAX;filter.aMin=A_MIN;filter.aMax=A_MAX;filter.years=[];closeFilters();render();};
  $('fApply').onclick=closeFilters;
  $('fmodal').classList.add('show');
}
function closeFilters(){$('fmodal').classList.remove('show');}

function openSort(){
  const s=$('ssheet');
  s.innerHTML=`<div class="grab"></div><div class="fhead"><h2>Ordenar por</h2></div>
    <div class="schips" id="sChips" style="flex-direction:column;align-items:stretch"></div>`;
  const c=$('sChips');
  Object.entries(SORTS).forEach(([k,l])=>{
    const b=document.createElement('button');b.className='schip'+(state.sort===k?' on':'');
    b.style.textAlign='left';b.textContent=l;
    b.onclick=()=>{state.sort=k;closeSort();render();};
    c.appendChild(b);
  });
  $('smodal').classList.add('show');
}
function closeSort(){$('smodal').classList.remove('show');}

function renderRanked(arr){
  arr=[...arr].sort(cmp(state.sort));
  const total=arr.length, show=arr.slice(0,RANK_LIMIT);
  let h=`<div class="countline">${total} unidades · ${SORTS[state.sort].toLowerCase()}</div>`;
  if(!total){h+=`<div class="empty">Nenhuma unidade com esses filtros.</div>`;$('main').innerHTML=h;return;}
  show.forEach(u=>{
    h+=`<div class="ucard" onclick="openUnit(${DATA.indexOf(u)})">
      <div class="rkctx">${u.b} · ${u.e}</div>
      <div class="urow1"><span class="uunit">Unid. ${u.u||'—'}</span><span class="uval">${fmtBRL(u.v)}</span></div>
      <div class="utype">${u.t||'—'} ${badge(u.s)}</div>
      <div class="rkmeta">${fmtArea(u.ap)} · ${u.pm!=null?fmtBRL(u.pm)+'/m²':'—'} · entrega ${u.ep||'—'}</div>
      ${BROKER?commBar(u.v):''}
    </div>`;
  });
  if(total>RANK_LIMIT) h+=`<button class="morebtn" onclick="loadMore()">Mostrar mais (${total-RANK_LIMIT} restantes)</button>`;
  $('main').innerHTML=h;
}
function loadMore(){RANK_LIMIT+=300;render();}

function renderHome(){
  const us=units(),byBairro=groupBy(us,'b');
  const totalEmp=new Set(us.map(u=>u.b+'¦'+u.e)).size;
  const vgv=us.reduce((s,u)=>s+(u.v||0),0);
  let h=`<div class="stats">
    <div class="stat"><div class="n serif">${us.length.toLocaleString('pt-BR')}</div><div class="l">Unidades</div></div>
    <div class="stat"><div class="n serif">${totalEmp}</div><div class="l">Empreend.</div></div>
    <div class="stat"><div class="n serif">${vgv>=1e9?(vgv/1e9).toLocaleString('pt-BR',{maximumFractionDigits:1})+' bi':(vgv/1e6).toLocaleString('pt-BR',{maximumFractionDigits:0})+' mi'}</div><div class="l">VGV (R$)</div></div>
  </div><div class="sectionlabel">Bairros</div>`;
  const bairros=[...byBairro.entries()].sort((a,b)=>b[1].length-a[1].length);
  if(!bairros.length){h+=`<div class="empty">Nenhuma unidade com esses filtros.</div>`;$('main').innerHTML=h;return;}
  for(const [b,arr] of bairros){
    const emps=new Set(arr.map(u=>u.e)).size, r=range(arr,'v');
    h+=`<div class="card" onclick="go('emp','${esc(b)}')"><div class="body">
      <div class="name serif">${b}</div><div class="meta">${emps} empreend. · ${arr.length} un.</div>
      <div class="sub">${rangeLabel(r)}</div></div><div class="chev">›</div></div>`;
  }
  $('main').innerHTML=h;
}
function renderEmp(){
  const us=units().filter(u=>u.b===state.bairro),byEmp=groupBy(us,'e');
  let h=`<div class="countline">${byEmp.size} empreendimentos · ${us.length} unidades</div>`;
  if(!us.length){h+=`<div class="empty">Nenhuma unidade com esses filtros.</div>`;$('main').innerHTML=h;return;}
  for(const [e,arr] of [...byEmp.entries()].sort((a,b)=>a[0].localeCompare(b[0],'pt-BR'))){
    const r=range(arr,'v'),ends=[...new Set(arr.map(u=>u.ep).filter(x=>x&&x!=='—'))].slice(0,2).join(' · ');
    const addr=(arr.find(u=>u.en&&u.en!=='—')||{}).en||'';
    h+=`<div class="card" onclick="go('units','${esc(state.bairro)}','${esc(e)}')"><div class="body">
      <div class="name serif">${e}</div>${addr?`<div class="sub">${addr}</div>`:''}
      <div class="meta">${arr.length} un. · ${rangeLabel(r)}</div>
      ${ends?`<span class="pill">Entrega ${ends}</span>`:''}</div><div class="chev">›</div></div>`;
  }
  $('main').innerHTML=h;
}
function renderUnits(){
  let us=units().filter(u=>u.b===state.bairro&&u.e===state.emp).sort((a,b)=>(a.v||0)-(b.v||0));
  let h=`<div class="countline">${us.length} unidades</div>`;
  if(!us.length){h+=`<div class="empty">Nenhuma unidade com esses filtros.</div>`;$('main').innerHTML=h;return;}
  us.forEach(u=>{
    h+=`<div class="ucard" onclick="openUnit(${DATA.indexOf(u)})">
      <div class="urow1"><div><span class="uunit">${u.u||'—'}</span></div><div class="uval">${fmtBRL(u.v)}</div></div>
      <div class="utype">${u.t||'—'} ${badge(u.s)}</div>
      <div class="ugrid">
        <div><span class="k">Priv.</span><span class="v">${fmtArea(u.ap)}</span></div>
        <div><span class="k">R$/m²</span><span class="v">${u.pm!=null?fmtBRL(u.pm):'—'}</span></div>
        <div><span class="k">Vagas</span><span class="v">${u.vg&&u.vg!=='-'?u.vg:'—'}</span></div>
        <div><span class="k">Entrega</span><span class="v">${u.ep||'—'}</span></div>
      </div>${BROKER?commBar(u.v):''}</div>`;
  });
  $('main').innerHTML=h;
}
function renderSearch(){
  const us=units(),byEmp=groupBy(us,'e');
  let h=`<div class="countline">${us.length} unidades em ${byEmp.size} empreendimentos</div>`;
  if(!us.length){h+=`<div class="empty">Nada encontrado para "${filter.q}".</div>`;$('main').innerHTML=h;return;}
  const byB=groupBy(us,'b');
  for(const [b,arr] of [...byB.entries()].sort((a,b)=>a[0].localeCompare(b[0],'pt-BR'))){
    h+=`<div class="sectionlabel">${b}</div>`;
    for(const [e,uarr] of [...groupBy(arr,'e').entries()].sort((a,b)=>a[0].localeCompare(b[0],'pt-BR'))){
      const r=range(uarr,'v');
      h+=`<div class="card" onclick="clearSearch();go('units','${esc(b)}','${esc(e)}')"><div class="body">
        <div class="name serif">${e}</div><div class="meta">${uarr.length} un. · ${rangeLabel(r)}</div></div><div class="chev">›</div></div>`;
    }
  }
  $('main').innerHTML=h;
}
function openUnit(idx){
  const u=DATA[idx];if(!u)return;
  const row=(k,v)=>`<div class="r"><span class="k">${k}</span><span class="v">${v}</span></div>`;
  $('sheet').innerHTML=`<button class="closebtn" onclick="closeModal()">×</button><div class="grab"></div>
    <div class="dt-emp">${u.b} · ${u.e}</div><div class="dt-unit serif">Unidade ${u.u||'—'}</div>
    <div>${badge(u.s)}</div><div class="dt-val serif">${fmtBRL(u.v)}</div>
    <div class="dt-pm">${u.pm!=null?fmtBRL(u.pm)+' / m²':''}</div>
    <div class="dt-table">
      ${row('Tipologia',u.t||'—')}${row('Área privativa',fmtArea(u.ap))}${row('Área total',fmtArea(u.at))}
      ${row('Vagas',u.vg&&u.vg!=='-'?u.vg:'—')}${row('Entrega prevista',u.ep||'—')}
      ${u.en&&u.en!=='—'?row('Endereço',u.en):''}${row('Bairro',u.b)}
    </div>
    ${BROKER&&u.v!=null?`<div class="commbox">
      <div class="commtitle">Comissão estimada (s/ VGV)</div>
      <div class="commrow"><span>Simples · 0,9%</span><span>${fmtBRL(u.v*COMM[0])}</span></div>
      <div class="commrow"><span>1,5%</span><span>${fmtBRL(u.v*COMM[1])}</span></div>
      <div class="commrow"><span>2,0%</span><span>${fmtBRL(u.v*COMM[2])}</span></div>
    </div>`:''}`;
  $('modal').classList.add('show');
}
function closeModal(){$('modal').classList.remove('show');}

function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function clearSearch(){filter.q='';$('search').value='';$('clrBtn').classList.remove('show');}
function go(view,bairro,emp){state.view=view;if(bairro!==undefined)state.bairro=bairro;if(emp!==undefined)state.emp=emp;window.scrollTo(0,0);render();}
function render(){
  const key=JSON.stringify([filter,state]); if(key!==_lastKey)RANK_LIMIT=200; _lastKey=key;
  renderFilters();
  const back=$('backBtn'),ctx=$('ctx');
  if(filter.q){back.classList.remove('show');ctx.textContent='Resultados';ctx.className='ctx';renderSearch();return;}
  const sorted=state.sort!=='bairro';
  if(state.view==='home'){back.classList.remove('show');ctx.textContent='Todos os bairros';ctx.className='ctx';
    sorted?renderRanked(units()):renderHome();}
  else if(state.view==='emp'){back.classList.add('show');ctx.textContent=state.bairro;ctx.className='ctx serif';
    sorted?renderRanked(units().filter(u=>u.b===state.bairro)):renderEmp();}
  else if(state.view==='units'){back.classList.add('show');ctx.textContent=state.emp;ctx.className='ctx serif';
    sorted?renderRanked(units().filter(u=>u.b===state.bairro&&u.e===state.emp)):renderUnits();}
}
$('backBtn').onclick=()=>{if(state.view==='units')go('emp');else if(state.view==='emp')go('home');};
$('search').addEventListener('input',e=>{filter.q=e.target.value.trim();$('clrBtn').classList.toggle('show',!!filter.q);window.scrollTo(0,0);render();});
$('clrBtn').onclick=()=>{clearSearch();render();};
$('ovl').onclick=closeModal;
$('fovl').onclick=closeFilters;
$('sovl').onclick=closeSort;
render();
</script>
</body>
</html>
